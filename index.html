<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TW Chain Terminal V2</title>
    <style>
      :root {
        --bg: #030b12;
        --bg-2: #07131e;
        --panel: rgba(10, 24, 38, 0.9);
        --panel-2: rgba(13, 32, 48, 0.95);
        --panel-3: rgba(7, 18, 28, 0.92);
        --line: rgba(108, 158, 197, 0.18);
        --line-2: rgba(108, 158, 197, 0.08);
        --text: #dce8f6;
        --muted: #88a4c0;
        --dim: #5c738b;
        --accent: #4ec8ff;
        --accent-2: #7f8cff;
        --good: #2fe38f;
        --good-bg: rgba(47, 227, 143, 0.12);
        --warn: #ffc857;
        --warn-bg: rgba(255, 200, 87, 0.12);
        --bad: #ff6270;
        --bad-bg: rgba(255, 98, 112, 0.12);
        --high: #ff8f70;
        --high-bg: rgba(255, 143, 112, 0.14);
        --shadow: 0 22px 80px rgba(0, 0, 0, 0.28);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 12px;
        --radius-sm: 9px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "IBM Plex Sans", "Noto Sans TC", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 0% 0%, rgba(78, 200, 255, 0.12), transparent 24rem),
          radial-gradient(circle at 100% 0%, rgba(127, 140, 255, 0.08), transparent 28rem),
          linear-gradient(180deg, #020910 0%, #040c15 55%, #02070c 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: 24px 24px;
        mask-image: linear-gradient(180deg, rgba(255, 255, 255, 0.4), transparent 80%);
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1680px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 18px 0 32px;
      }

      .panel {
        background: linear-gradient(180deg, var(--panel) 0%, var(--panel-3) 100%);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .ticker {
        display: flex;
        gap: 12px;
        align-items: center;
        overflow: hidden;
        padding: 10px 14px;
        border-radius: 16px;
        background: rgba(8, 20, 31, 0.9);
        border: 1px solid var(--line);
      }

      .ticker-track {
        display: flex;
        gap: 14px;
        min-width: max-content;
        animation: ticker 34s linear infinite;
      }

      @keyframes ticker {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(-50%);
        }
      }

      .ticker-item {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line-2);
        background: rgba(255, 255, 255, 0.03);
        white-space: nowrap;
        font-size: 0.84rem;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(340px, 0.9fr);
        gap: 18px;
        margin-top: 18px;
        padding: 22px;
      }

      .hero-copy {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.8rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .hero-copy p {
        margin: 0;
        color: var(--muted);
        max-width: 70ch;
        line-height: 1.7;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        font-size: 0.84rem;
        color: var(--muted);
      }

      .hero-side {
        display: grid;
        gap: 12px;
      }

      .hero-stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-stat {
        padding: 16px;
        border-radius: var(--radius-md);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
        border: 1px solid var(--line);
      }

      .hero-stat strong {
        display: block;
        font-size: 1.5rem;
        margin-top: 10px;
      }

      .hero-stat span,
      .kicker,
      .tiny {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .market-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .market-card {
        padding: 18px;
      }

      .market-card h2,
      .section-title,
      .panel-title {
        margin: 0;
        font-size: 0.92rem;
        color: var(--muted);
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .market-card strong {
        display: block;
        margin-top: 10px;
        font-size: 1.75rem;
      }

      .delta,
      .tone {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 600;
      }

      .positive {
        color: var(--good);
        background: var(--good-bg);
      }

      .negative {
        color: var(--bad);
        background: var(--bad-bg);
      }

      .neutral {
        color: var(--warn);
        background: var(--warn-bg);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-top: 18px;
        padding: 16px;
      }

      .preset-row,
      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button,
      select,
      input {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
      }

      button,
      select {
        cursor: pointer;
      }

      .preset-btn {
        padding: 9px 13px;
        color: var(--muted);
      }

      .preset-btn.active,
      .ghost-btn:hover,
      .preset-btn:hover {
        border-color: rgba(78, 200, 255, 0.4);
        color: var(--text);
        background: rgba(78, 200, 255, 0.08);
      }

      .filter-row select,
      .filter-row input {
        min-width: 120px;
        padding: 10px 12px;
      }

      .filter-row input {
        min-width: 230px;
      }

      .ghost-btn {
        padding: 10px 14px;
      }

      .boards {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .board {
        padding: 16px;
      }

      .board-header,
      .split-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .board-list,
      .mini-list,
      .announcement-list,
      .alert-list,
      .driver-list,
      .cadence-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .board-item,
      .mini-item,
      .alert-item,
      .announcement-item,
      .driver-item {
        display: grid;
        gap: 8px;
        padding: 12px 0;
        border-top: 1px solid var(--line-2);
      }

      .board-item:first-child,
      .mini-item:first-child,
      .alert-item:first-child,
      .announcement-item:first-child,
      .driver-item:first-child {
        border-top: none;
        padding-top: 0;
      }

      .row-main,
      .row-sub {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .stock-btn,
      .announcement-btn {
        width: 100%;
        display: block;
        text-align: left;
        background: transparent;
        border: none;
        padding: 0;
        color: inherit;
      }

      .stock-btn:hover strong,
      .announcement-btn:hover strong {
        color: var(--accent);
      }

      .stock-head {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .code {
        font-family: "IBM Plex Mono", "Consolas", monospace;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(360px, 0.95fr);
        gap: 18px;
        margin-top: 18px;
      }

      .leaderboard,
      .detail {
        padding: 18px;
      }

      .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }

      .leaderboard-table th,
      .leaderboard-table td {
        text-align: left;
        padding: 12px 10px;
        border-top: 1px solid var(--line-2);
        font-size: 0.9rem;
      }

      .leaderboard-table th {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        position: sticky;
        top: 0;
        background: rgba(7, 18, 28, 0.96);
        z-index: 1;
      }

      .leaderboard-wrap {
        max-height: 860px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 14px;
      }

      .leaderboard-table tbody tr {
        cursor: pointer;
        transition: background 0.18s ease;
      }

      .leaderboard-table tbody tr:hover {
        background: rgba(78, 200, 255, 0.05);
      }

      .leaderboard-table tbody tr.active {
        background: rgba(78, 200, 255, 0.08);
      }

      .score {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .score-bar {
        width: 64px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .score-bar span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
      }

      .detail {
        position: sticky;
        top: 18px;
        align-self: start;
      }

      .detail-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .detail-head h3 {
        margin: 4px 0 0;
        font-size: 2rem;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .metric {
        padding: 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }

      .metric strong {
        display: block;
        margin-top: 10px;
        font-size: 1.2rem;
      }

      .detail-block {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line-2);
      }

      .driver-item {
        grid-template-columns: auto 1fr auto;
        align-items: center;
      }

      .driver-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .strategy-grid,
      .footer-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 18px;
      }

      .strategy-card,
      .footer-card {
        padding: 18px;
      }

      .strategy-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .strategy-top p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .metric-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .metric-pill {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.82rem;
      }

      .cadence-list li {
        padding: 10px 0;
        border-top: 1px solid var(--line-2);
        color: var(--muted);
        line-height: 1.65;
      }

      .cadence-list li:first-child {
        border-top: none;
        padding-top: 0;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.78rem;
      }

      .alert-item {
        gap: 10px;
      }

      .alert-level {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .alert-high {
        background: var(--high-bg);
        color: var(--high);
      }

      .alert-medium {
        background: var(--warn-bg);
        color: var(--warn);
      }

      .alert-low {
        background: rgba(78, 200, 255, 0.12);
        color: var(--accent);
      }

      .muted {
        color: var(--muted);
      }

      .empty {
        padding: 26px;
        border: 1px dashed var(--line);
        border-radius: 16px;
        color: var(--muted);
        text-align: center;
      }

      .loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-size: 1rem;
        color: var(--muted);
      }

      @media (max-width: 1200px) {
        .hero,
        .workspace,
        .strategy-grid,
        .footer-grid {
          grid-template-columns: 1fr;
        }

        .boards,
        .market-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .detail {
          position: static;
        }
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100vw - 18px, 100%);
          padding-top: 10px;
        }

        .hero,
        .leaderboard,
        .detail,
        .strategy-card,
        .footer-card {
          padding: 16px;
        }

        .boards,
        .market-grid,
        .hero-stat-grid,
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .controls {
          align-items: stretch;
        }

        .filter-row {
          width: 100%;
        }

        .filter-row input,
        .filter-row select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="loading">載入 V2 資料中…</div>
    <script>
      const state = {
        preset: "market",
        market: "all",
        tone: "all",
        catalyst: "all",
        eventType: "all",
        sort: "signal",
        query: "",
        selectedCode: null,
      };

      const SORTERS = {
        signal: (a, b) =>
          b.signal.score - a.signal.score ||
          (b.revenueYoY ?? -999) - (a.revenueYoY ?? -999) ||
          (b.tradeValue ?? 0) - (a.tradeValue ?? 0),
        revenueYoY: (a, b) =>
          (b.revenueYoY ?? -999) - (a.revenueYoY ?? -999) ||
          b.signal.score - a.signal.score,
        revenueMoM: (a, b) =>
          (b.revenueMoM ?? -999) - (a.revenueMoM ?? -999) ||
          b.signal.score - a.signal.score,
        tradeValue: (a, b) =>
          (b.tradeValue ?? 0) - (a.tradeValue ?? 0) ||
          b.signal.score - a.signal.score,
        eventScore: (a, b) =>
          (b.eventScore ?? 0) - (a.eventScore ?? 0) ||
          b.signal.score - a.signal.score ||
          (b.tradeValue ?? 0) - (a.tradeValue ?? 0),
      };

      let dashboard = null;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function toneClass(value) {
        if (value === null || value === undefined) return "neutral";
        if (value > 0) return "positive";
        if (value < 0) return "negative";
        return "neutral";
      }

      function signalToneClass(tone) {
        if (tone === "strong" || tone === "positive") return "positive";
        if (tone === "negative") return "negative";
        return "neutral";
      }

      function levelClass(level) {
        if (level === "high") return "alert-high";
        if (level === "medium") return "alert-medium";
        return "alert-low";
      }

      function formatTime(iso) {
        const date = new Date(iso);
        if (Number.isNaN(date.getTime())) return "無資料";
        return date.toLocaleString("zh-TW", {
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function detailDataFor(code) {
        return dashboard?.detailByCode?.[code] || dashboard?.leaderboard?.find((item) => item.code === code) || null;
      }

      function getFilteredRows() {
        if (!dashboard) return [];
        let rows = [...dashboard.leaderboard];

        if (state.preset === "semiconductor") {
          rows = rows.filter((row) => row.lens === "semiconductor");
        } else if (state.preset === "nonElectronics") {
          rows = rows.filter((row) => row.lens === "nonElectronics");
        } else if (state.preset === "watchlist") {
          rows = rows.filter((row) => row.watchlist);
        } else if (state.preset === "catalysts") {
          rows = rows.filter((row) => row.catalystCount > 0);
        } else if (state.preset === "divergence") {
          rows = rows.filter(
            (row) =>
              row.alertFlags?.includes("revenuePriceLag") ||
              row.alertFlags?.includes("priceAheadOfFundamentals"),
          );
        }

        if (state.market !== "all") {
          rows = rows.filter((row) => row.market === state.market);
        }

        if (state.tone !== "all") {
          rows = rows.filter((row) => row.signal.tone === state.tone);
        }

        if (state.catalyst === "with") {
          rows = rows.filter((row) => row.catalystCount > 0);
        } else if (state.catalyst === "without") {
          rows = rows.filter((row) => row.catalystCount === 0);
        }

        if (state.eventType !== "all") {
          rows = rows.filter((row) => (row.eventTypes || []).includes(state.eventType));
        }

        if (state.query.trim()) {
          const query = state.query.trim().toLowerCase();
          rows = rows.filter((row) =>
            [row.code, row.name, row.industry, row.chain, row.focus].some((field) =>
              String(field || "").toLowerCase().includes(query),
            ),
          );
        }

        rows.sort(SORTERS[state.sort]);
        return rows;
      }

      function renderTicker() {
        const rows = [
          ...dashboard.boards.topSignal.slice(0, 6),
          ...dashboard.alerts.slice(0, 6).map((alert) => ({
            code: alert.code,
            name: alert.name,
            signal: { label: alert.title, score: alert.signalScore, tone: alert.level === "high" ? "strong" : "neutral" },
            priceChangeDisplay: alert.marketLabel,
          })),
        ];

        const items = [...rows, ...rows]
          .map(
            (row) => `
              <div class="ticker-item">
                <span class="code">${escapeHtml(row.code)}</span>
                <strong>${escapeHtml(row.name)}</strong>
                <span class="tone ${signalToneClass(row.signal.tone)}">${escapeHtml(row.signal.label)}</span>
              </div>
            `,
          )
          .join("");

        return `
          <div class="ticker">
            <span class="eyebrow">Live Scan</span>
            <div class="ticker-track">${items}</div>
          </div>
        `;
      }

      function renderBoards() {
        const definitions = [
          ["topSignal", "強訊號排行", "優先檢查訊號分數與資料是否能延續"],
          ["semiconductorLeaders", "半導體鏈領先", "先看設備、封裝、載板與晶圓需求是否同步擴散"],
          ["nonElectronicsLeaders", "非電子鏈領先", "把量、價、成本與政策一起看，不只看單月跳升"],
          ["topTradeValue", "成交值排行", "成交放大不等於做多，先看是否伴隨基本面"],
          ["catalysts", "事件催化排行", "重大訊息是催化，不是 thesis 本身"],
          ["laggards", "偏弱名單", "用來找風險、反向驗證與價格背離"],
        ];

        return `
          <section class="boards">
            ${definitions
              .map(([key, title, note]) => {
                const rows = dashboard.boards[key].slice(0, 6);
                return `
                  <article class="panel board">
                    <div class="board-header">
                      <div>
                        <h2 class="panel-title">${title}</h2>
                        <div class="tiny">${note}</div>
                      </div>
                      <span class="tiny">${rows.length} 檔</span>
                    </div>
                    <ul class="board-list">
                      ${rows
                        .map(
                          (row) => `
                            <li class="board-item">
                              <button class="stock-btn" data-code="${escapeHtml(row.code)}">
                                <div class="row-main">
                                  <div class="stock-head">
                                    <span class="code">${escapeHtml(row.code)}</span>
                                    <strong>${escapeHtml(row.name)}</strong>
                                  </div>
                                  <span class="tone ${signalToneClass(row.signal.tone)}">${escapeHtml(row.signal.label)}</span>
                                </div>
                                <div class="row-sub muted">
                                  <span>${escapeHtml(row.chain)}${row.primaryEventLabel ? ` · ${escapeHtml(row.primaryEventLabel)}` : ""}</span>
                                  <span>${escapeHtml(row.revenueYoYDisplay)} / ${escapeHtml(row.priceChangeDisplay)}</span>
                                </div>
                              </button>
                            </li>
                          `,
                        )
                        .join("")}
                    </ul>

      function bindEvents() {
        document.querySelectorAll("[data-code]").forEach((node) => {
          node.addEventListener("click", () => {
            state.selectedCode = node.getAttribute("data-code");
            renderDashboard();
          });
        });

        document.querySelectorAll("[data-preset]").forEach((node) => {
          node.addEventListener("click", () => {
            state.preset = node.getAttribute("data-preset");
            renderDashboard();
          });
        });

        document.querySelectorAll("tbody tr[data-code]").forEach((row) => {
          row.addEventListener("click", () => {
            state.selectedCode = row.getAttribute("data-code");
            renderDashboard();
          });
        });

        document.getElementById("marketFilter")?.addEventListener("change", (event) => {
          state.market = event.target.value;
          renderDashboard();
        });

        document.getElementById("toneFilter")?.addEventListener("change", (event) => {
          state.tone = event.target.value;
          renderDashboard();
        });

        document.getElementById("catalystFilter")?.addEventListener("change", (event) => {
          state.catalyst = event.target.value;
          renderDashboard();
        });

        document.getElementById("eventTypeFilter")?.addEventListener("change", (event) => {
          state.eventType = event.target.value;
          renderDashboard();
        });

        document.getElementById("sortFilter")?.addEventListener("change", (event) => {
          state.sort = event.target.value;
          renderDashboard();
        });

        document.getElementById("searchInput")?.addEventListener("input", (event) => {
          state.query = event.target.value;
          renderDashboard();
        });

        document.getElementById("refreshButton")?.addEventListener("click", async () => {
          await loadDashboard(true);
        });
      }

      async function loadDashboard(forceRefresh = false) {
        const response = await fetch(
          `./data/dashboard.json${forceRefresh ? `?ts=${Date.now()}` : ""}`,
          { cache: forceRefresh ? "no-store" : "default" },
        );
        dashboard = await response.json();
        renderDashboard();
      }

      loadDashboard().catch((error) => {
        const app = document.getElementById("app");
        app.className = "shell";
        app.innerHTML = `<div class="panel" style="padding:24px;color:#ff6270;">資料載入失敗：${escapeHtml(
          error.message,
        )}</div>`;
      });

      setInterval(() => {
        loadDashboard(true).catch(() => {});
      }, 10 * 60 * 1000);
    </script>
  </body>
</html>
