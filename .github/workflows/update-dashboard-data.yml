name: Update dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 * * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/update-dashboard.mjs"
      - ".github/workflows/update-dashboard-data.yml"

concurrency:
  group: dashboard-data-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Sync with latest main
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin main || true

      - name: Generate dashboard data
        run: node scripts/update-dashboard.mjs

      - name: Commit updated data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/etf-tracks
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh dashboard data"
          git push || {
            git pull --rebase origin main
            node scripts/update-dashboard.mjs
            git add data/dashboard.json data/etf-tracks
            git diff --cached --quiet || git commit --amend --no-edit
            git push
          }
